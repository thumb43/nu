name: Run TikTok Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *' # إعادة تشغيل كل 30 دقيقة للتأكد من الحالة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install
      - run: node tiktok.js
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          
